services:
  web:
    build: .
    container_name: aka-web
    command: uv run uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
      - /app/.venv

  worker:
    build: .
    container_name: celery-worker
    command: uv run celery -A app.core.celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
      - /app/.venv
  redis:
    image: redis:7-alpine
    container_name: aka-redis
    ports:
      - "6379:6379"

  db:
    image: pgvector/pgvector:pg16
    container_name: aka-db
    environment:
      POSTGRES_DB: aka_db
      POSTGRES_USER: zo_o
      POSTGRES_PASSWORD: 0909
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: